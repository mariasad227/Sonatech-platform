<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SonaTech – Empowering Digital Learning</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ===== CSS VARIABLES ===== */
    :root {
      --orange: #E8941A;
      --orange-dark: #C97D10;
      --orange-light: #F5A835;
      --black: #1a1a1a;
      --white: #ffffff;
      --gray-50: #f8f8f8;
      --gray-100: #f0f0f0;
      --gray-200: #e4e4e4;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-800: #1f2937;
      --bg: #dce6f0;
      --card-bg: rgba(255,255,255,0.1);
      --card-bg-solid: rgba(255,255,255,0.95);
      --glass-border: rgba(255,255,255,0.2);
      --glass-shadow: 0 8px 32px rgba(0,0,0,0.1);
      --glass-shadow-lg: 0 20px 60px rgba(0,0,0,0.15);
      --backdrop-blur: blur(20px);
      --backdrop-blur-sm: blur(10px);
      --shadow: 0 4px 24px rgba(0,0,0,0.12);
      --shadow-lg: 0 12px 48px rgba(0,0,0,0.18);
      --radius: 14px;
      --radius-lg: 20px;
      --font-body: 'Plus Jakarta Sans', sans-serif;
      --font-display: 'Sora', sans-serif;
      --transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--black);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== BACKGROUND HERO ===== */
    .page-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(160deg, #c9d8e8 0%, #b8cedd 40%, #a8bfcf 100%);
    }
    .page-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url('images/sonacomp.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.25;
      z-index: 1;
      pointer-events: none;
    }
    .page-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.04;
      z-index: 2;
    }
    /* Building silhouette */
    .building-bg {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 0;
      height: 65%;
      background: linear-gradient(to top, rgba(100,130,155,0.35) 0%, transparent 100%);
      pointer-events: none;
    }
    .building-bg::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40%;
      background: repeating-linear-gradient(
        90deg,
        rgba(255,255,255,0.03) 0px,
        rgba(255,255,255,0.03) 40px,
        transparent 40px,
        transparent 80px
      );
    }

    /* ===== LAYOUT ===== */
    #root { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    /* ===== NAVBAR ===== */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--card-bg);
      backdrop-filter: var(--backdrop-blur);
      -webkit-backdrop-filter: var(--backdrop-blur);
      border-bottom: 1px solid var(--glass-border);
      padding: 0 32px;
      height: 68px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--glass-shadow);
    }
    .navbar-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      cursor: pointer;
    }
    .navbar-logo {
      width: 56px;
      height: 56px;
      background: var(--orange);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 6px 16px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .navbar-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .navbar-logo svg { width: 32px; height: 32px; }
    .navbar-title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--black);
      letter-spacing: -0.5px;
    }
    .navbar-actions { display: flex; align-items: center; gap: 12px; }
    .btn-ghost {
      background: none;
      border: none;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--black);
      cursor: pointer;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: underline;
      transition: var(--transition);
    }
    .btn-ghost:hover { background: var(--gray-100); }
    .btn-primary {
      background: var(--orange);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.3);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      padding: 9px 22px;
      border-radius: 10px;
      transition: var(--transition);
      box-shadow: var(--glass-shadow);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
    }
    .btn-primary:hover {
      background: var(--orange-dark);
      transform: translateY(-2px);
      box-shadow: var(--glass-shadow-lg);
      border-color: rgba(255,255,255,0.5);
    }
    .btn-primary:active { transform: translateY(0); box-shadow: var(--glass-shadow); }
    .btn-secondary {
      background: var(--card-bg);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      color: var(--black);
      border: 1px solid var(--glass-border);
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      padding: 9px 22px;
      border-radius: 10px;
      transition: var(--transition);
      box-shadow: var(--glass-shadow);
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
      box-shadow: var(--glass-shadow-lg);
      border-color: rgba(255,255,255,0.4);
    }
    .btn-secondary.active {
      background: var(--orange);
      color: var(--white);
      border-color: var(--orange-dark);
      transform: translateY(0);
      box-shadow: var(--glass-shadow);
    }
    .globe-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--black);
      padding: 8px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      transition: var(--transition);
    }
    .globe-btn:hover { background: var(--gray-100); }

    /* ===== FOOTER ===== */
    .footer {
      background: var(--black);
      color: var(--white);
      text-align: center;
      padding: 14px;
      font-size: 0.82rem;
      font-weight: 500;
      letter-spacing: 0.2px;
      margin-top: auto;
    }
    .footer span { color: var(--orange); font-style: italic; }

    /* ===== MAIN CONTENT ===== */
    .page-content { flex: 1; position: relative; }

    /* ===== HERO PAGE ===== */
    .hero-section {
      min-height: calc(100vh - 68px - 46px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
    }
    .hero-card {
      background: var(--card-bg);
      backdrop-filter: var(--backdrop-blur);
      -webkit-backdrop-filter: var(--backdrop-blur);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      padding: 52px 56px;
      max-width: 640px;
      width: 100%;
      text-align: center;
      box-shadow: var(--glass-shadow-lg);
      animation: slideUp 0.5s ease both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .hero-card h1 {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--black);
      margin-bottom: 32px;
    }
    .hero-card h1 strong { color: var(--orange); }
    .discover-btn {
      position: fixed;
      bottom: 60px;
      right: 28px;
      background: var(--orange);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.3);
      font-family: var(--font-body);
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 20px;
      border-radius: 12px;
      box-shadow: var(--glass-shadow);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      transition: var(--transition);
      text-decoration: underline;
      z-index: 50;
    }
    .discover-btn:hover {
      background: var(--orange-dark);
      transform: translateY(-3px);
      box-shadow: var(--glass-shadow-lg);
      border-color: rgba(255,255,255,0.5);
    }

    /* ===== COURSES PAGE ===== */
    .courses-page { padding: 28px 32px; }
    .search-bar-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .back-btn {
      background: var(--card-bg);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: 50%;
      width: 40px; height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: var(--transition);
      flex-shrink: 0;
      box-shadow: var(--glass-shadow);
    }
    .back-btn:hover {
      background: rgba(255,255,255,0.2);
      box-shadow: var(--glass-shadow-lg);
      border-color: rgba(255,255,255,0.4);
    }
    .search-input-wrap {
      flex: 1;
      background: var(--card-bg);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 48px;
      box-shadow: var(--glass-shadow);
    }
    .search-input-wrap svg { color: var(--gray-400); flex-shrink: 0; margin-right: 10px; }
    .search-input-wrap input {
      flex: 1;
      border: none;
      outline: none;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--black);
      background: transparent;
    }
    .search-input-wrap input::placeholder { color: var(--gray-400); text-decoration: underline; }

    .courses-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .course-card {
      background: var(--card-bg);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      transition: var(--transition);
      box-shadow: var(--glass-shadow);
      animation: slideUp 0.4s ease both;
    }
    .course-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--glass-shadow-lg);
      border-color: rgba(255,255,255,0.3);
    }
    .course-card-header {
      background: #8B7355;
      color: var(--white);
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      padding: 10px 16px;
      text-align: center;
    }
    .course-card-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: var(--gray-200);
    }
    .course-card-img-placeholder {
      width: 100%;
      height: 160px;
      background: linear-gradient(135deg, var(--gray-200) 0%, var(--gray-100) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .course-card-body { padding: 14px 16px; }
    .course-card-desc { font-size: 0.82rem; color: var(--gray-600); line-height: 1.5; }

    /* ===== COURSE DETAIL ===== */
    .course-detail-page { padding: 0 0 32px; }
    .course-tabs {
      display: flex;
      justify-content: center;
      gap: 0;
      padding: 18px 32px;
      background: var(--card-bg);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      border-bottom: 1px solid var(--glass-border);
    }
    .tab-container {
      background: rgba(255,255,255,0.1);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      display: flex;
      padding: 4px;
      box-shadow: var(--glass-shadow);
    }
    .tab-btn {
      padding: 9px 24px;
      border: none;
      background: none;
      font-family: var(--font-body);
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 50px;
      transition: var(--transition);
      color: var(--gray-600);
      white-space: nowrap;
    }
    .tab-btn.active {
      background: var(--card-bg-solid);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      color: var(--black);
      box-shadow: var(--glass-shadow);
      font-weight: 700;
      border: 1px solid var(--glass-border);
    }
    .tab-btn:not(.active):hover { background: var(--gray-100); color: var(--black); }

    .course-detail-card {
      background: var(--card-bg);
      backdrop-filter: var(--backdrop-blur);
      -webkit-backdrop-filter: var(--backdrop-blur);
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      margin: 0 32px;
      padding: 40px 48px;
      box-shadow: var(--glass-shadow-lg);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      align-items: start;
      animation: slideUp 0.4s ease both;
    }
    .course-badge {
      display: inline-block;
      background: var(--orange);
      color: var(--white);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.1rem;
      padding: 10px 32px;
      border-radius: 50px;
      margin-bottom: 28px;
      box-shadow: var(--glass-shadow);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      border: 1px solid rgba(255,255,255,0.3);
    }
    .course-detail-title {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--black);
    }
    .course-detail-desc {
      font-size: 0.9rem;
      color: var(--gray-600);
      line-height: 1.7;
      text-align: center;
      margin-bottom: 28px;
    }
    .course-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 32px;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.88rem;
      color: var(--gray-500);
      font-weight: 500;
    }
    .meta-item svg { color: var(--gray-400); flex-shrink: 0; }
    .course-img-right {
      width: 100%;
      height: 280px;
      object-fit: cover;
      border-radius: var(--radius);
      border: 2px solid var(--gray-200);
      background: var(--gray-200);
    }
    .course-img-placeholder {
      width: 100%;
      height: 280px;
      background: linear-gradient(135deg, var(--gray-200), var(--gray-100));
      border-radius: var(--radius);
      border: 2px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
    }
    .start-btn {
      background: var(--orange);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.3);
      font-family: var(--font-display);
      font-size: 1.05rem;
      font-weight: 700;
      padding: 14px 48px;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: var(--glass-shadow);
      backdrop-filter: var(--backdrop-blur-sm);
      -webkit-backdrop-filter: var(--backdrop-blur-sm);
      transition: var(--transition);
      text-decoration: underline;
      display: block;
      text-align: center;
      width: fit-content;
      margin: 0 auto;
    }
    .start-btn:hover {
      background: var(--orange-dark);
      transform: translateY(-3px);
      box-shadow: var(--glass-shadow-lg);
      border-color: rgba(255,255,255,0.5);
    }

    /* ===== TRAINER SECTION ===== */
    .trainer-card {
      background: var(--card-bg);
      backdrop-filter: var(--backdrop-blur);
      -webkit-backdrop-filter: var(--backdrop-blur);
      border-radius: var(--radius-lg);
      border: 1px solid var(--glass-border);
      margin: 0 32px;
      padding: 40px 48px;
      box-shadow: var(--glass-shadow-lg);
      animation: slideUp 0.4s ease both;
    }
    .trainer-header { display: flex; align-items: center; gap: 24px; margin-bottom: 32px; }
    .trainer-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid var(--orange);
      background: linear-gradient(135deg, #f0c5f0, #c5d5f0);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      overflow: hidden;
      flex-shrink: 0;
    }
    .trainer-name { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; }
    .trainer-role { color: var(--gray-500); font-size: 0.9rem; margin-top: 4px; }
    .trainer-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 32px;
    }
    .stat-box {
      background: #f3f0ff;
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stat-icon { color: var(--orange); font-size: 1.2rem; }
    .stat-value { font-family: var(--font-display); font-weight: 700; font-size: 1.1rem; }
    .stat-label { font-size: 0.78rem; color: var(--gray-500); }
    .trainer-about h3 { font-weight: 700; margin-bottom: 12px; }
    .trainer-about p { color: var(--gray-600); font-size: 0.9rem; line-height: 1.6; }

    /* ===== FAQ SECTION ===== */
    .faq-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      border: 1.5px solid var(--gray-200);
      margin: 0 32px;
      padding: 40px 48px;
      box-shadow: var(--shadow-lg);
      animation: slideUp 0.4s ease both;
    }
    .faq-item { border-bottom: 1px solid var(--gray-200); padding: 18px 0; }
    .faq-q { font-weight: 600; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .faq-a { font-size: 0.88rem; color: var(--gray-600); margin-top: 10px; line-height: 1.6; display: none; }
    .faq-a.open { display: block; }

    /* ===== AUTH PAGES ===== */
    .auth-page {
      min-height: calc(100vh - 68px - 46px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
    }
    .auth-header-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 32px;
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
    }
    .auth-card {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      border: 2px solid var(--black);
      padding: 40px 48px;
      max-width: 560px;
      width: 100%;
      box-shadow: 8px 8px 0 rgba(0,0,0,0.12);
      animation: slideUp 0.4s ease both;
    }
    .auth-card h1 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-weight: 600; margin-bottom: 8px; font-size: 0.9rem; }
    .form-input {
      width: 100%;
      background: var(--gray-100);
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: 13px 16px;
      font-family: var(--font-body);
      font-size: 0.92rem;
      color: var(--black);
      outline: none;
      transition: border-color 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .form-input:focus { border-color: var(--orange); }
    .input-with-icon {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--gray-100);
      border: 1.5px solid var(--gray-200);
      border-radius: 10px;
      padding: 13px 16px;
    }
    .input-with-icon:focus-within { border-color: var(--orange); }
    .input-with-icon svg { color: var(--gray-400); flex-shrink: 0; }
    .input-with-icon input {
      border: none;
      background: transparent;
      outline: none;
      flex: 1;
      font-family: var(--font-body);
      font-size: 0.92rem;

// ===== COURSES LISTING =====
function CoursesPage({ onNavigate, currentUser, language = 'en', courses }) {
  const [search, setSearch] = useState('');
  const filtered = courses.filter(c => {
    const courseTitle = getCourseTranslation(c.id, 'title', language);
    return c.category.toLowerCase().includes(search.toLowerCase()) ||
           courseTitle.toLowerCase().includes(search.toLowerCase());
  });
  const handleCourseClick = (course) => {
    if (!currentUser) { onNavigate('auth-gate'); return; }
    onNavigate('course-detail', { course });
  };
  return (
    <div className="courses-page">
      <div className="search-bar-wrap">
        <button className="back-btn" onClick={() => onNavigate('home')}><Icon.Back /></button>
        <div className="search-input-wrap">
          <Icon.Search />
          <input
            type="text"
            placeholder={t('searchCourse', language)}
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
      </div>
      <div className="courses-grid">
        {filtered.map((course, i) => (
          <div key={course.id} className="course-card" style={{animationDelay:`${i*0.07}s`}} onClick={() => handleCourseClick(course)}>
            <div className="course-card-header">{course.category}</div>
            <img src={course.image} alt={course.title} className="course-card-img" onError={e => { e.target.onerror = null; e.target.src = 'images/placeholder-course.png'; }} />
            <div className="course-card-img-placeholder" style={{display:'none'}}>{course.emoji}</div>
            <div className="course-card-body">
              <div style={{fontWeight:'700', fontSize:'0.9rem', marginBottom:'6px'}}>{getCourseTranslation(course.id, 'title', language)}</div>
              <div className="course-card-desc" style={{WebkitLineClamp:2, display:'-webkit-box', WebkitBoxOrient:'vertical', overflow:'hidden'}}>
                {getCourseTranslation(course.id, 'desc', language)}
              </div>
              <div style={{display:'flex', gap:'12px', marginTop:'10px', flexWrap:'wrap'}}>
                <span style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'0.78rem',color:'var(--gray-500)'}}>
                  <Icon.Clock /> {course.hours}h
                </span>
                <span style={{display:'flex',alignItems:'center',gap:'4px',fontSize:'0.78rem',color:'var(--gray-500)'}}>
                  <Icon.Users /> {course.employees.toLocaleString()}
                </span>
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function CoursePlanPage({ course, onNavigate, language = 'en', courseVideos = {}, videoProgress = {}, setVideoProgress, courses }) {
  const recommended = courses.filter(c => c.id !== course.id).slice(0, 4);
  const [selectedLessonIndex, setSelectedLessonIndex] = useState(0);
  
  // Use trainer-uploaded videos if available, otherwise use default course outline videos
  const videosForCourse = courseVideos[course.id] && courseVideos[course.id].length > 0
    ? courseVideos[course.id]
    : course.outline || [];
  
  const currentLesson = videosForCourse && videosForCourse[selectedLessonIndex] ? videosForCourse[selectedLessonIndex] : null;

  // Check if all videos are completed
  const courseProgress = videoProgress[course.id] || {};
  const allVideosCompleted = videosForCourse.length > 0 && videosForCourse.every((_, index) => courseProgress[index]);

  const markVideoCompleted = (index) => {
    setVideoProgress(prev => ({
      ...prev,
      [course.id]: {
        ...prev[course.id],
        [index]: true
      }
    }));
  };

  const handleLessonClick = (index) => {
    setSelectedLessonIndex(index);
    // Mark as completed when clicked (simulating watching)
    markVideoCompleted(index);
  };

  const getVideoTypeEmoji = (type) => {
    switch(type?.toLowerCase()) {
      case 'video': return '▶️';
      case 'live workshop': return '🎤';
      case 'workshop': return '👥';
      case 'case study': return '📊';
      case 'project': return '🎯';
      case 'seminar': return '🎓';
      case 'simulation': return '⚙️';
      default: return '📹';
    }
  };

  return (
    <div className="course-detail-page">
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'20px' }}>
        <button className="back-btn" onClick={() => onNavigate('course-detail', { course })}><Icon.Back /></button>
        <h2 style={{ fontFamily:'var(--font-display)', fontSize:'1.35rem', fontWeight:'800' }}>{t('courseRoadmap', language)}</h2>
      </div>

      <div className="course-detail-card" style={{ gridTemplateColumns:'1fr' }}>
        <div>
          <p style={{ fontSize:'1rem', fontWeight:'600', marginBottom:'12px' }}>{t('enrolledCourse', language)}:</p>
          <div className="course-detail-title" style={{ fontSize:'1.2rem', marginBottom:'8px' }}>{getCourseTranslation(course.id, 'title', language)}</div>
          <div className="course-detail-desc">{getCourseTranslation(course.id, 'desc', language)}</div>

          {/* VIDEO PLAYER SECTION */}
          {videosForCourse && videosForCourse.length > 0 && (
            <div className="video-player-container">
              {courseVideos[course.id] && courseVideos[course.id].length > 0 && (
                <div style={{background:'#e0f2fe', border:'1px solid #0ea5e9', borderRadius:'8px', padding:'10px 12px', marginBottom:'12px', display:'flex', alignItems:'center', gap:'8px', fontSize:'0.85rem', color:'#0369a1', fontWeight:'600'}}>
                  ✓ Trainer Content: This course has custom videos uploaded by your instructor
                </div>
              )}
              <div className="video-player">
                {currentLesson && currentLesson.videoUrl ? (
                  <iframe
                    width="100%"
                    height="100%"
                    src={currentLesson.videoUrl + (currentLesson.videoUrl.includes('youtube') ? '?modestbranding=1&rel=0&showinfo=0' : '')}
                    title={currentLesson.lesson || currentLesson.title}
                    frameBorder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"

                ) : (

                    <svg fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24">

                  <div style={{ fontWeight:'700' }}>{index + 1}. {item.lesson || item.title}</div>
                  <div style={{ fontSize:'0.82rem', color:'var(--gray-600)' }}>{item.type} • {item.duration}</div>

            {!videosForCourse?.length && <div style={{ fontSize:'0.9rem', color:'var(--gray-500)' }}>Outline not available yet for this course.</div>}
          </div>

          <div style={{ marginTop:'20px' }}>
            <button className="btn-primary" onClick={() => onNavigate('quiz', { course })}>

function LoginPage({ onNavigate, onLogin, users, language = 'en' }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [remember, setRemember] = useState(true);
  const [error, setError] = useState('');
  const [showForgot, setShowForgot] = useState(false);
  const [forgotEmail, setForgotEmail] = useState('');
  const [forgotMessage, setForgotMessage] = useState('');

  const handleLogin = () => {
    const cleanEmail = email.trim().toLowerCase();
    const cleanPassword = password.trim();
    if (!cleanEmail || !cleanPassword) { setError('Please fill in all fields.'); return; }
    const user = users.find(u => u.email.toLowerCase() === cleanEmail && u.password === cleanPassword);
    if (!user) { setError('Invalid email or password. Try: admin@sonatrach.dz / admin123'); return; }
    onLogin(user);
    onNavigate('dashboard');
  };

  return (
    <div className="auth-page">
      <button className="back-btn" style={{alignSelf:'flex-start', marginBottom:'16px'}} onClick={() => onNavigate('home')}><Icon.Back /></button>
      <div style={{textAlign:'center', marginBottom:'16px'}}>
        <h2 style={{fontFamily:'var(--font-display)', fontSize:'1.6rem', fontWeight:'800', color:'white', textShadow:'0 2px 8px rgba(0,0,0,0.3)'}}>{t('platformTitle', language)}</h2>
      </div>
      <div className="auth-card">
        {error && <div className="alert alert-error">{error}</div>}
        <div className="form-group">
          <label>{t('email', language)}</label>
          <div className="input-with-icon">
            <Icon.Person />
            <input type="email" placeholder={t('typeYourEmail', language)} value={email} onChange={e => setEmail(e.target.value)} />
          </div>
        </div>
        <div className="form-group">
          <label>{t('password', language)}</label>
          <div className="input-with-icon">
            <Icon.Lock />
            <input type="password" placeholder={t('typeYourPassword', language)} value={password} onChange={e => setPassword(e.target.value)}
              onKeyDown={e => e.key==='Enter' && handleLogin()} />
          </div>
        </div>
        <button className="btn-primary btn-full" onClick={handleLogin}>Login</button>
        <div className="login-extras">
          <div className="remember-me" onClick={() => setRemember(!remember)}>
            <div className="remember-checkbox">{remember && <Icon.Check />}</div>
            Remember me
          </div>
          <span className="forgot-link" role="button" onClick={() => { setShowForgot(true); setForgotMessage(''); }}>
            {t('forgotPassword', language)}
          </span>
        </div>
        <div style={{marginTop:'20px', padding:'12px', background:'var(--gray-50)', borderRadius:'10px', fontSize:'0.8rem', color:'var(--gray-600)'}}>
          <strong>Demo accounts:</strong><br/>
          admin@sonatrach.dz / admin123<br/>
          trainer@sonatrach.dz / trainer123<br/>
          employee@sonatrach.dz / emp123
        </div>
      </div>

      {showForgot && (
        <div className="modal-overlay" onClick={() => { setShowForgot(false); setForgotMessage(''); }}>
          <div className="modal-card" onClick={e => e.stopPropagation()}>
            <h2>{t('forgotPassword', language)}</h2>
            <div className="form-group">
              <label>{t('email', language)}</label>
              <input type="email" placeholder={t('typeYourEmail', language)} value={forgotEmail} onChange={e => setForgotEmail(e.target.value)} />
            </div>
            {forgotMessage && <div className="alert alert-success" style={{marginBottom:'16px'}}>{forgotMessage}</div>}
            <div className="modal-actions">
              <button className="btn-secondary" onClick={() => { setShowForgot(false); setForgotEmail(''); setForgotMessage(''); }}>{t('cancel', language)}</button>
              <button className="btn-primary" onClick={() => {
                const target = forgotEmail.trim().toLowerCase();
                if (!target) {
                  setForgotMessage('Please enter your email.');
                  return;
                }
                const targetUser = users.find(u => u.email.toLowerCase() === target);
                if (!targetUser) {
                  setForgotMessage('No account found for this email.');
                  return;
                }
                setForgotMessage(`Password recovery: your password is \"${targetUser.password}\"`);
              }}>{t('forgotPassword', language)}</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function SignupPage({ onNavigate, onLogin, language = 'en' }) {
  const [form, setForm] = useState({ role:'', name:'', email:'', password:'', confirm:'' });

  const handleSignup = () => {

  return (

// ===== QUIZ PAGE =====
function QuizPage({ course, onNavigate, currentUser, courseQuizzes, language = 'en', videoProgress = {} }) {
  const [currentQ, setCurrentQ] = useState(0);
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [score, setScore] = useState(0);
  const [done, setDone] = useState(false);

  // Use course-specific quiz if available, otherwise use default QUIZ_QUESTIONS for the course
  const quizData = courseQuizzes[course.id] && courseQuizzes[course.id].length > 0 
    ? courseQuizzes[course.id] 
    : QUIZ_QUESTIONS[course.id] || QUIZ_QUESTIONS.linux; // fallback to linux questions

  const q = quizData[currentQ];

  const handleSelect = (idx) => {
    if (answered) return;
    setSelected(idx);
    setAnswered(true);
    if (idx === q.correct) setScore(s => s+1);
  };
  const handleNext = () => {
    if (currentQ < quizData.length - 1) {
      setCurrentQ(c => c+1);
      setSelected(null);
      setAnswered(false);
    } else {
      setDone(true);
    }
  };

  if (done) {
    const pct = Math.round((score / quizData.length) * 100);
    
    // Check if all videos are completed
    const videosForCourse = course.outline || [];
    const courseProgress = videoProgress[course.id] || {};
    const allVideosCompleted = videosForCourse.length > 0 && videosForCourse.every((_, index) => courseProgress[index]);
    
    const passed = pct >= 70 && allVideosCompleted;
    
    return (
      <div style={{padding:'32px'}}>
        <button className="back-btn" onClick={() => onNavigate('courses')}><Icon.Back /></button>
        <div className="quiz-card" style={{textAlign:'center'}}>
          <div style={{fontSize:'4rem', marginBottom:'16px'}}>{passed ? '🎉' : '📚'}</div>
          <h2 style={{fontFamily:'var(--font-display)', fontWeight:'800', fontSize:'1.5rem', marginBottom:'8px'}}>
            {passed ? 'Congratulations!' : 'Keep Learning!'}
          </h2>
          <p style={{color:'var(--gray-600)', marginBottom:'24px'}}>
            You scored <strong>{score}/{quizData.length}</strong> ({pct}%)
            {passed ? ' — You passed!' : allVideosCompleted ? ' — 70% required to pass.' : ' — Complete all videos to pass.'}
          </p>
          {!allVideosCompleted && (
            <div style={{background:'#fef3c7', border:'1px solid #f59e0b', borderRadius:'8px', padding:'12px', marginBottom:'16px', color:'#92400e'}}>
              <div style={{fontWeight:'600'}}>⚠️ Complete all course videos before taking the quiz to earn your certificate.</div>
            </div>
          )}
          <div style={{background: passed ? '#f0fdf4':'#fef2f2', border:`2px solid ${passed?'#86efac':'#fca5a5'}`, borderRadius:'12px', padding:'16px', marginBottom:'24px'}}>
            <div style={{fontSize:'2rem', fontWeight:'800', color: passed?'#16a34a':'#dc2626'}}>{pct}%</div>
            <div style={{fontSize:'0.85rem', color:'var(--gray-600)'}}>{passed?'Certificate earned!':'Try again to earn your certificate'}</div>
          </div>
          {passed && (
            <button className="btn-primary" style={{marginRight:'12px'}} onClick={() => onNavigate('certificate', {course, userName: currentUser?.name || 'Employee'})}>
              Download Certificate
            </button>
          )}
          {!passed && (
            <button className="btn-primary" onClick={() => { setCurrentQ(0); setSelected(null); setAnswered(false); setScore(0); setDone(false); }}>
              Retry Quiz
            </button>
          )}
          <button className="btn-secondary" style={{marginLeft:'12px'}} onClick={() => onNavigate('courses')}>Back to Courses</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:'32px'}}>
      <div style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'24px'}}>
        <button className="back-btn" onClick={() => onNavigate('course-detail', {course})}><Icon.Back /></button>
        <span style={{fontFamily:'var(--font-display)', fontWeight:'700', fontSize:'1.1rem'}}>{course.category} — Quiz</span>
      </div>
      {courseQuizzes[course.id] && courseQuizzes[course.id].length > 0 && (
        <div style={{background:'#e0f2fe', border:'1px solid #0ea5e9', borderRadius:'8px', padding:'10px 12px', marginBottom:'12px', display:'flex', alignItems:'center', gap:'8px', fontSize:'0.85rem', color:'#0369a1', fontWeight:'600'}}>
          ✓ Trainer Content: This quiz was created by your instructor
        </div>
      )}
      <div className="quiz-card">
        <div className="quiz-progress-header">
          <span>Question {currentQ + 1} of {quizData.length}</span>
          <span>Score: {score}</span>
        </div>
        <div className="progress-bar" style={{marginBottom:'24px'}}>
          <div className="progress-fill" style={{width:`${((currentQ)/quizData.length)*100}%`}}></div>
        </div>
        <div className="quiz-question">{q.q}</div>
        <div className="quiz-options">
          {q.options.map((opt, i) => {
            let cls = 'quiz-option';
            if (answered) {
              if (i === q.correct) cls += ' correct';
              else if (i === selected) cls += ' wrong';
            } else if (i === selected) cls += ' selected';
            return (
              <div key={i} className={cls} onClick={() => handleSelect(i)}>
                <div style={{width:'24px', height:'24px', borderRadius:'50%', border:'2px solid currentColor', display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, fontSize:'0.8rem', fontWeight:'700'}}>
                  {String.fromCharCode(65+i)}
                </div>
                {opt}
              </div>
            );
          })}
        </div>
        <div className="quiz-nav">
          <div></div>
          {answered && (
            <button className="btn-primary" onClick={handleNext}>
              {currentQ < quizData.length - 1 ? 'Next Question →' : 'See Results'}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function CertificatePage({ course, userName, onNavigate, language = 'en' }) {
  const today = new Date().toLocaleDateString('en-GB', {day:'numeric', month:'long', year:'numeric'});

  return (

function TrainerDashboard({ user, onNavigate, activeNav, setActiveNav, language = 'en', courses, setCourses, courseVideos = {}, setCourseVideos, courseQuizzes = {}, setCourseQuizzes }) {
  const [showUpload, setShowUpload] = useState(false);
  const [showQuizEditor, setShowQuizEditor] = useState(false);
  const [selectedCourse, setSelectedCourse] = useState('');
  const [quizCreated, setQuizCreated] = useState(false);
  const [selectedFile, setSelectedFile] = useState(null);
  const [uploadStatus, setUploadStatus] = useState(null);
  const [isDragging, setIsDragging] = useState(false);
  const [newVideoMeta, setNewVideoMeta] = useState({ title: '', duration: '', description: '' });
  const [newQuizQuestion, setNewQuizQuestion] = useState({ q: '', options: ['', '', '', ''], correct: 0 });
  const [editingQuizIndex, setEditingQuizIndex] = useState(null);
  const [newCourse, setNewCourse] = useState({ category: '', title: '', desc: '', hours: 0, language: 'Arabic', certificate: true, image: '', outline: [] });
  const fileInputRef = useRef(null);

  const trainerCourses = courses;
  const currentCourse = trainerCourses.find(c => c.id === selectedCourse) || trainerCourses[0] || { id: '', category: '', title: '', desc: '', hours: 0, language: 'Arabic', certificate: true, image: 'images/placeholder-course.png', trainer: { name: user.name } };
  const courseVidList = selectedCourse ? courseVideos[selectedCourse] || [] : [];
  const courseQuizList = selectedCourse ? courseQuizzes[selectedCourse] || [] : [];

  useEffect(() => {
    if (!selectedCourse && trainerCourses.length > 0) {
      setSelectedCourse(trainerCourses[0].id);
    }
  }, [trainerCourses, selectedCourse]);

  useEffect(() => {
    if (!['courses', 'create', 'results'].includes(activeNav)) {
      setActiveNav('courses');
    }
  }, [activeNav, setActiveNav]);

  const handleFileSelect = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setSelectedFile(file);
    setUploadStatus(null);
  };

  const handleDrop = (e) => {
    e.preventDefault();
    e.stopPropagation();
    setIsDragging(false);
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    setSelectedFile(file);
    setUploadStatus(null);
  };

  const handleUploadVideo = () => {
    if (!selectedFile || !newVideoMeta.title || !newVideoMeta.duration) {
      setUploadStatus('error');
      return;
    }
    setUploadStatus('uploading');

    setTimeout(() => {
      const newVideo = {
        id: Date.now() + Math.random(),
        title: newVideoMeta.title,
        videoUrl: '#',
        duration: newVideoMeta.duration,
        description: newVideoMeta.description,
        type: 'Video'
      };
      setCourseVideos({
        ...courseVideos,
        [selectedCourse]: [...(courseVideos[selectedCourse] || []), newVideo]
      });
      setUploadStatus('success');
      setShowUpload(false);
      setSelectedFile(null);
      setNewVideoMeta({ title: '', duration: '', description: '' });
      setTimeout(() => setUploadStatus(null), 1800);
    }, 900);
  };

  const handleDeleteVideo = (videoId) => {
    setCourseVideos({
      ...courseVideos,
      [selectedCourse]: courseVideos[selectedCourse].filter(v => v.id !== videoId)
    });
  };

  const handleAddQuizQuestion = () => {
    if (!newQuizQuestion.q.trim() || newQuizQuestion.options.some(o => !o.trim())) {
      alert('Please fill in all fields');
      return;
    }
    
    const updated = [...courseQuizList];
    if (editingQuizIndex !== null) {
      updated[editingQuizIndex] = newQuizQuestion;
      setEditingQuizIndex(null);
    } else {
      updated.push(newQuizQuestion);
    }
    
    setCourseQuizzes({
      ...courseQuizzes,
      [selectedCourse]: updated
    });
    
    setNewQuizQuestion({ q: '', options: ['', '', '', ''], correct: 0 });
    setShowQuizEditor(false);
  };

  const handleDeleteQuizQuestion = (index) => {
    setCourseQuizzes({
      ...courseQuizzes,
      [selectedCourse]: courseQuizList.filter((_, i) => i !== index)
    });
  };

  const handleEditQuestion = (index) => {
    setNewQuizQuestion(courseQuizList[index]);
    setEditingQuizIndex(index);
    setShowQuizEditor(true);
  };

  const handleCreateCourse = () => {
    if (!newCourse.category || !newCourse.title || !newCourse.desc) {
      alert('Please fill in all required fields');
      return;
    }
    const course = {
      id: newCourse.category.toLowerCase().replace(/\s+/g, ''),

      title: newCourse.title,

      hours: newCourse.hours,
      employees: 0,
      language: newCourse.language,
      certificate: newCourse.certificate,
      image: newCourse.image || 'images/placeholder-course.png',
      outline: newCourse.outline,
      createdBy: user.email,
      trainer: { name: user.name, role: 'Trainer', rating: 0, reviews: 0, employees: 0, courses: 1, about: '' }
    };
    setCourses([...courses, course]);
    setNewCourse({ category: '', title: '', desc: '', hours: 0, language: 'Arabic', certificate: true, image: '', outline: [] });
    setSelectedCourse(course.id);
    setActiveNav('courses');

  return (
    <div className="dashboard-main">

function DashboardPage({ user, onNavigate, onLogout, users, setUsers, language = 'en', courses, setCourses, courseVideos, setCourseVideos, courseQuizzes, setCourseQuizzes, videoProgress }) {
  const [activeNav, setActiveNav] = useState('overview');
  const [showChangePassword, setShowChangePassword] = useState(false);
  const [changePasswordData, setChangePasswordData] = useState({ current: '', new: '', confirm: '' });

  const navItems = {
    admin: [
      { id:'overview', label:'overview', icon:'Home' },
      { id:'users', label:'manageUsers', icon:'Users' },
      { id:'courses', label:'manageCourses', icon:'Book' },
      { id:'progress', label:'monitorProgress', icon:'Monitor' },
      { id:'reports', label:'generateReports', icon:'Chart' }
    ],
    trainer: [
      { id:'courses', label:'myCourses', icon:'Book' },
      { id:'create', label:'createCourse', icon:'Plus' },
      { id:'results', label:'viewResults', icon:'Chart' }
    ],
    employee: [
      { id:'home', label:'myLearning', icon:'Home' },
      { id:'certificates', label:'certificates', icon:'Award' }
    ]
  };

  const handleChangePassword = () => {
    if (changePasswordData.current !== user.password) {
      alert(t('changePasswordError', language) + ': Incorrect current password');
      return;
    }
    if (changePasswordData.new !== changePasswordData.confirm) {
      alert(t('changePasswordError', language) + ': Passwords do not match');
      return;
    }
    if (changePasswordData.new.length < 6) {
      alert(t('changePasswordError', language) + ': Password must be at least 6 characters');
      return;
    }
    setUsers(users.map(u => u.id === user.id ? { ...u, password: changePasswordData.new } : u));
    setChangePasswordData({ current: '', new: '', confirm: '' });
    setShowChangePassword(false);
    alert(t('changePasswordSuccess', language));
  };

  const items = navItems[user.role] || navItems.employee;

  const renderMain = () => {
    if (user.role === 'admin') return <AdminDashboard onNavigate={onNavigate} activeNav={activeNav} setActiveNav={setActiveNav} language={language} />;
    if (user.role === 'trainer') return <TrainerDashboard user={user} onNavigate={onNavigate} activeNav={activeNav} setActiveNav={setActiveNav} language={language} />;
    return <EmployeeDashboard user={user} onNavigate={onNavigate} language={language} />;

  // For admin, sync nav

        </aside>

            <button className="logout-btn" onClick={onLogout}><Icon.LogOut /> Logout</button>
          </div>
        </aside>
        <div style={{flex:1, overflowY:'auto'}}>
          <TrainerDashboard user={user} onNavigate={onNavigate} activeNav={nav} setActiveNav={setNav} language={language} courses={courses} setCourses={setCourses} courseVideos={courseVideos} setCourseVideos={setCourseVideos} courseQuizzes={courseQuizzes} setCourseQuizzes={setCourseQuizzes} />

    </>
  );
}

function App() {

  const [currentUser, setCurrentUser] = useState(null);
  const [language, setLanguage] = useState('en');
  const [courses, setCourses] = useState(COURSES_DATA);
  const [courseVideos, setCourseVideos] = useState({}); // {courseId: [{id, title, videoUrl, duration}]}
  const [courseQuizzes, setCourseQuizzes] = useState({}); // {courseId: [{q, options, correct}]}
  const [videoProgress, setVideoProgress] = useState({}); // {courseId: {videoIndex: true/false}}
  const [users, setUsers] = useState([
    { email: 'admin@sonatrach.dz', password: 'admin123', role: 'admin', name: 'Admin User' },
    { email: 'trainer@sonatrach.dz', password: 'trainer123', role: 'trainer', name: 'SAADI MARIA' },
    { email: 'employee@sonatrach.dz', password: 'emp123', role: 'employee', name: 'Ahmed Benali' }
  ]);

  const navigate = (to, data = {}) => {
    setPage(to);
    setPageData(data);
    window.scrollTo(0, 0);
  };

  const handleLogin = (user) => setCurrentUser(user);
  const handleLogout = () => { setCurrentUser(null); navigate('home'); };

  const renderPage = () => {
    switch (page) {
      case 'home': return <HomePage onNavigate={navigate} language={language} />;
      case 'courses': return <CoursesPage onNavigate={navigate} currentUser={currentUser} language={language} courses={courses} />;
      case 'auth-gate': return <AuthGatePage onNavigate={navigate} language={language} />;
      case 'course-detail': return <CourseDetailPage course={pageData.course} onNavigate={navigate} currentUser={currentUser} language={language} courses={courses} />;
      case 'course-plan': return <CoursePlanPage course={pageData.course} onNavigate={navigate} language={language} courseVideos={courseVideos} videoProgress={videoProgress} setVideoProgress={setVideoProgress} courses={courses} />;
      case 'login': return <LoginPage onNavigate={navigate} onLogin={handleLogin} users={users} language={language} />;
      case 'signup': return <SignupPage onNavigate={navigate} onLogin={handleLogin} language={language} />;
      case 'dashboard': return currentUser ? <DashboardPage user={currentUser} onNavigate={navigate} onLogout={handleLogout} users={users} setUsers={setUsers} language={language} courses={courses} setCourses={setCourses} courseVideos={courseVideos} setCourseVideos={setCourseVideos} courseQuizzes={courseQuizzes} setCourseQuizzes={setCourseQuizzes} videoProgress={videoProgress} /> : <LoginPage onNavigate={navigate} onLogin={handleLogin} users={users} language={language} />;
      case 'quiz': return <QuizPage course={pageData.course} onNavigate={navigate} currentUser={currentUser} language={language} courseQuizzes={courseQuizzes} videoProgress={videoProgress} />;
      case 'certificate': return <CertificatePage course={pageData.course} userName={pageData.userName} onNavigate={navigate} language={language} />;
      default: return <HomePage onNavigate={navigate} language={language} />;
    }
  };

  const showNavbarFooter = !['dashboard'].includes(page);

  return (
    <>
      <div className="page-bg"></div>
      <div className="building-bg"></div>
      <div id="root" style={{display:'flex', flexDirection:'column', minHeight:'100vh', position:'relative', zIndex:1}}>
        <Navbar onNavigate={navigate} currentUser={currentUser} onLogout={handleLogout} language={language} onLanguageChange={setLanguage} />
        <main className="page-content" style={{flex:1}}>
          {renderPage()}
        </main>
        <Footer language={language} />
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
